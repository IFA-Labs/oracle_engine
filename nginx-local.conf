events {}

http {
    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------
    # HTTP (80): ACME + redirect
    # -------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name api.ifalabs.com;

        # Allow ACME HTTP-01 challenges
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------
    # HTTPS (443): Reverse proxy
    # -------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.ifalabs.com;

        # TLS certs from Let's Encrypt (update after issuing)
        ssl_certificate     /etc/letsencrypt/live/api.ifalabs.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ifalabs.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer-when-downgrade always;

        # Proxy to your Go app container (service name `oracle`)
        location / {
            proxy_pass                          http://oracle:8000;
            proxy_http_version                  1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout                  60s;
            proxy_connect_timeout               60s;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}