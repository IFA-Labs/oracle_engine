version: '3.8'

# Base Docker Compose Configuration
# For development: docker compose -f docker-compose.dev.yml up
# For production: docker compose -f docker-compose.prod.yml up

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-small-logging: &small-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-large-logging: &large-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 10s

services:
  oracle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      timescale:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=timescale
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - APP_ENV=dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *healthcheck-defaults
    ports:
      - "8000:8000"
    networks:
      - oracle-net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    ports:
      - "6379:6379"
    networks:
      - oracle-net
    logging: *small-logging

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: timescale
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      <<: *healthcheck-defaults
    ports:
      - "5430:5432"
    networks:
      - oracle-net
    logging: *large-logging

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      oracle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      <<: *healthcheck-defaults
    networks:
      - oracle-net
    logging: *default-logging

volumes:
  redis-data:
  timescale-data:

networks:
  oracle-net:
    driver: bridge
