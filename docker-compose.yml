version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-small-logging: &small-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-large-logging: &large-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:
  # -------------------------
  # Go backend service
  # -------------------------
  oracle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - redis
      - timescale
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=timescale
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - APP_ENV=prod
      - APP_USER=gorgeous-kata
    expose:
      - "8000"
    networks:
      - oracle-net
    logging: *default-logging

  # -------------------------
  # Redis cache
  # -------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - oracle-net
    logging: *small-logging

  # -------------------------
  # PostgreSQL + TimescaleDB
  # -------------------------
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: timescale-dev
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    networks:
      - oracle-net
    logging: *large-logging

  # -------------------------
  # Nginx reverse proxy + SSL
  # -------------------------
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:rw
      - ./letsencrypt:/etc/letsencrypt:rw
    depends_on:
      - oracle
    networks:
      - oracle-net
    logging: *default-logging

  # -------------------------
  # Certbot for SSL issuance & renewal
  # -------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./letsencrypt:/etc/letsencrypt:rw
    entrypoint: /bin/sh
    networks:
      - oracle-net
    logging: *small-logging

  # -------------------------
  # Optional: Auto-renew cron (runs every 12h)
  # -------------------------
  certbot-renewal:
    image: certbot/certbot:latest
    container_name: certbot-renewal
    command: sh -c "while :; do certbot renew && nginx -s reload; sleep 12h; done"
    volumes:
      - ./letsencrypt:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx
    networks:
      - oracle-net
    restart: unless-stopped
    logging: *small-logging

# -------------------------
# Volumes & Networks
# -------------------------
volumes:
  redis-data:
  timescale-data:
  letsencrypt:
  certbot-www:

networks:
  oracle-net:
    driver: bridge
