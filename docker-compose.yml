
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-small-logging: &small-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "3"

x-large-logging: &large-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "3"

services:
  oracle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - redis
      - timescale
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=timescale
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - APP_ENV=dev
      - APP_USER=gorgeous-kata
    ports:
      - "8000:8000"
    networks:
      - oracle-net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - oracle-net
    logging: *small-logging

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: timescale-dev
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    networks:
      - oracle-net
    logging: *large-logging

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
    depends_on:
      - oracle
    networks:
      - oracle-net
    logging: *default-logging

volumes:
  redis-data:
  timescale-data:


networks:
  oracle-net:
    driver: bridge
