# Subscription Plans Configuration
subscription_plans:
  free:
    name: "Free tier"
    price: 0
    api_requests: 1000
    rate_limit_per_hour: 10   # 10 requests per hour
    rate_limit_per_day: 100   # 100 requests per day
    data_access: "Two feeds"
    custom_pairs: 0
    request_cost: 0
    support: "Email & Community"
    historical_data: false
    private_data: false
  
  developer:
    name: "Developer tier"
    price: 50
    api_requests: 10000
    rate_limit_per_hour: 100  # 100 requests per hour
    rate_limit_per_day: 1000  # 1000 requests per day
    data_access: "All feeds"
    custom_pairs: 0
    request_cost: 0.0005
    support: "24/7 support"
    historical_data: false
    private_data: false
    
  professional:
    name: "Professional tier"
    price: 100
    api_requests: 100000
    rate_limit_per_hour: 500   # 500 requests per hour
    rate_limit_per_day: 10000  # 10,000 requests per day
    data_access: "All feeds + Historical data"
    custom_pairs: 3
    request_cost: 0.0002
    support: "24/7 support"
    historical_data: true
    private_data: false
    
  enterprise:
    name: "Enterprise tier"
    price: 0 # Custom pricing
    api_requests: 0 # Unlimited
    rate_limit_per_hour: 0 # Unlimited
    rate_limit_per_day: 0  # Unlimited
    data_access: "All feeds + Private"
    custom_pairs: -1 # Custom/unlimited
    request_cost: 0 # Custom
    support: "24/7 support + dedicated engineer"
    historical_data: true
    private_data: true
