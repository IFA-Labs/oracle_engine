# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    # Essential linters - these catch real bugs
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    
    # Code formatting
    - gofmt
    - goimports
    
    # Helpful but not blocking (can be enabled later)
    # - errcheck        # Enable after fixing error handling
    # - gosec           # Enable after fixing security issues
    # - revive          # Enable after fixing naming conventions
    # - gosimple
    # - misspell
    # - unconvert
    # - goconst
    # - prealloc
    # - bodyclose
    # - noctx
    # - sqlclosecheck

linters-settings:
  govet:
    enable-all: false
    disable:
      - shadow
      - unreachable  # Temporarily disabled - some code paths intentionally disabled
  
  gofmt:
    simplify: true
  
  goimports:
    local-prefixes: oracle_engine

  staticcheck:
    checks:
      - all
      - -SA1019  # Ignore deprecation warnings for now

issues:
  exclude-dirs:
    - vendor
    - docs
    - pkg/abi

  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - goconst
    
    # Exclude generated files
    - path: docs/
      linters:
        - all
    
    - path: pkg/abi/
      linters:
        - all
    
    # Exclude unreachable code warnings in middleware and services (temporarily disabled features)
    - path: internal/server/middleware/auth.go
      text: "unreachable"
    
    - path: internal/server/services/dashboard_service.go
      text: "unreachable"

  # Show all issues
  max-issues-per-linter: 0
  max-same-issues: 0
  
  # Don't fail on new issues in existing code
  new: false
